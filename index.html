<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Fraud Detection</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>💳 Credit Card Fraud Detection</h1>
        <p class="subtitle">
            Machine Learning Powered Fraud Analysis System
        </p>

        <form action="/predict" method="post">

            <div class="grid">

                <input type="text" name="f1" placeholder="Time" required>
                <input type="text" name="f2" placeholder="V1" required>

                <input type="text" name="f3" placeholder="V2" required>
                <input type="text" name="f4" placeholder="V3" required>

                <input type="text" name="f5" placeholder="V4" required>
                <input type="text" name="f6" placeholder="V5" required>

                <input type="text" name="f7" placeholder="V6" required>
                <input type="text" name="f8" placeholder="V7" required>

                <input type="text" name="f9" placeholder="V8" required>
                <input type="text" name="f10" placeholder="V9" required>

                <input type="text" name="f11" placeholder="V10" required>
                <input type="text" name="f12" placeholder="V11" required>

                <input type="text" name="f13" placeholder="V12" required>
                <input type="text" name="f14" placeholder="V13" required>

                <input type="text" name="f15" placeholder="V14" required>
                <input type="text" name="f16" placeholder="V15" required>

                <input type="text" name="f17" placeholder="V16" required>
                <input type="text" name="f18" placeholder="V17" required>

                <input type="text" name="f19" placeholder="V18" required>
                <input type="text" name="f20" placeholder="V19" required>

                <input type="text" name="f21" placeholder="V20" required>
                <input type="text" name="f22" placeholder="V21" required>

                <input type="text" name="f23" placeholder="V22" required>
                <input type="text" name="f24" placeholder="V23" required>

                <input type="text" name="f25" placeholder="V24" required>
                <input type="text" name="f26" placeholder="V25" required>

                <input type="text" name="f27" placeholder="V26" required>
                <input type="text" name="f28" placeholder="V27" required>

                <input type="text" name="f29" placeholder="V28" required>
                <input type="text" name="f30" placeholder="Amount" required>

            </div>

            <button type="submit">
                Analyze Transaction
            </button>

        </form>

        <div class="upload-section">

    <h2>Upload CSV File</h2>

    <form action="/upload" method="post" enctype="multipart/form-data">

        <input type="file" name="file" required>

        <button type="submit">
            Upload & Analyze CSV
        </button>

    </form>

</div>

        {% if prediction_text %}

        <div class="result">
            {{ prediction_text }}
        </div>

        {% endif %}

    </div>

</div>

</body>
</html>
